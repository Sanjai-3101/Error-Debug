<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Debug | Next-Gen Code Inspector</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0d1117;
      --panel-bg: #161b22;
      --border-color: #30363d;
      --accent-blue: #58a6ff;
      --accent-purple: #bc8cff;
      --error-red: #f85149;
      --error-bg: rgba(248, 81, 73, 0.15);
      --success-green: #3fb950;
      --text-main: #c9d1d9;
      --text-muted: #8b949e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(22, 27, 34, 0.8);
      backdrop-filter: blur(10px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .brand-logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #fff;
      font-size: 1.1rem;
    }

    .brand-title {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, #fff, var(--text-muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .container {
      max-width: 1300px;
      width: 100%;
      margin: 2rem auto;
      padding: 0 1.5rem;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 1.5rem;
      flex-grow: 1;
    }

    .editor-card {
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .editor-header {
      padding: 0.75rem 1.25rem;
      background: #0d1117;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .editor-title {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }

    .editor-wrapper {
      position: relative;
      flex-grow: 1;
      display: flex;
      font-family: 'Fira Code', monospace;
      font-size: 14px;
      line-height: 1.6;
      background: #0d1117;
      overflow: hidden;
      min-height: 480px;
    }

    .line-numbers {
      width: 50px;
      padding: 1rem 0;
      background: #161b22;
      border-right: 1px solid var(--border-color);
      color: var(--text-muted);
      text-align: right;
      user-select: none;
    }

    .line-number {
      padding-right: 12px;
      height: 22.4px; /* Matches line-height */
      transition: color 0.2s;
    }

    .line-number.has-error {
      color: var(--error-red);
      font-weight: bold;
      background: var(--error-bg);
      position: relative;
    }

    .line-number.has-error::before {
      content: "●";
      position: absolute;
      left: 8px;
      font-size: 8px;
    }

    textarea {
      flex-grow: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-main);
      padding: 1rem;
      font-family: inherit;
      font-size: inherit;
      line-height: 1.6;
      resize: none;
      white-space: pre;
      overflow-y: scroll;
      overflow-x: auto;
    }

    .action-panel {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .btn-run {
      background: linear-gradient(135deg, var(--accent-blue), #2563eb);
      color: white;
      border: none;
      padding: 1rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      box-shadow: 0 4px 12px rgba(88, 166, 255, 0.2);
    }

    .btn-run:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(88, 166, 255, 0.35);
    }

    .results-card {
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1.25rem;
      flex-grow: 1;
      overflow-y: auto;
      max-height: 520px;
    }

    .status-badge {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .status-pass {
      background: rgba(63, 185, 80, 0.15);
      color: var(--success-green);
      border: 1px solid rgba(63, 185, 80, 0.3);
    }

    .status-fail {
      background: var(--error-bg);
      color: var(--error-red);
      border: 1px solid rgba(248, 81, 73, 0.3);
    }

    .issue-item {
      background: #0d1117;
      border: 1px solid var(--border-color);
      border-left: 3px solid var(--error-red);
      border-radius: 6px;
      padding: 0.85rem;
      margin-bottom: 0.75rem;
      font-family: 'Fira Code', monospace;
      font-size: 0.82rem;
    }

    .issue-tag {
      color: var(--error-red);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.75rem;
      margin-bottom: 0.4rem;
    }

    .code-diff {
      background: #161b22;
      padding: 0.4rem 0.6rem;
      border-radius: 4px;
      margin-top: 0.3rem;
      word-break: break-all;
      white-space: pre-wrap;
    }

    .diff-expected { color: var(--success-green); }
    .diff-found { color: var(--error-red); }

    @media (max-width: 900px) {
      .container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header>
    <div class="brand">
      <div class="brand-logo">N</div>
      <div class="brand-title">Nova Debug</div>
    </div>
  </header>

  <div class="container">
    <div class="editor-card">
      <div class="editor-header">
        <span class="editor-title">Code Input Window</span>
      </div>
      <div class="editor-wrapper">
        <div class="line-numbers" id="lineNumbers">
          <div class="line-number">1</div>
        </div>
        <textarea id="codeEditor" placeholder="Paste or write your Python code here..." spellcheck="false"></textarea>
      </div>
    </div>

    <div class="action-panel">
      <button class="btn-run" onclick="runDebugger()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
        Inspect & Debug
      </button>

      <div class="results-card">
        <div id="resultsContainer">
          <p style="color: var(--text-muted); font-size: 0.9rem; text-align: center; margin-top: 2rem;">Run inspection to highlight discrepancies.</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const editor = document.getElementById('codeEditor');
    const lineNumbers = document.getElementById('lineNumbers');
    const resultsContainer = document.getElementById('resultsContainer');

    function updateLineNumbers(errorLines = []) {
      const lines = editor.value.split('\n');
      const lineCount = Math.max(lines.length, 1);
      
      let numbersHtml = '';
      for (let i = 1; i <= lineCount; i++) {
        const isError = errorLines.includes(i);
        numbersHtml += `<div class="line-number ${isError ? 'has-error' : ''}">${i}</div>`;
      }
      lineNumbers.innerHTML = numbersHtml;
    }

    editor.addEventListener('input', () => updateLineNumbers());
    editor.addEventListener('scroll', () => {
      lineNumbers.scrollTop = editor.scrollTop;
    });

    async function runDebugger() {
      const inputCode = editor.value;
      resultsContainer.innerHTML = `<p style="color: var(--text-muted); text-align: center;">Analyzing code structure...</p>`;

      try {
        const response = await fetch('/compare', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ input_code: inputCode })
        });

        const data = await response.json();

        if (data.match) {
          updateLineNumbers();
          resultsContainer.innerHTML = `
            <div class="status-badge status-pass">
              ✅ Inspection Passed: 0 Errors Found
            </div>
          `;
        } else {
          const errorLineNumbers = data.errors.map(err => err.line_no).filter(Boolean);
          updateLineNumbers(errorLineNumbers);

          let html = `
            <div class="status-badge status-fail">
              ⚠️ ${data.errors.length} Issue(s) Detected
            </div>
          `;

          data.errors.forEach((err, idx) => {
            html += `
              <div class="issue-item">
                <div class="issue-tag">Issue #${idx + 1} ${err.line_no ? `(Line ${err.line_no})` : ''} - ${err.type}</div>
                ${err.expected ? `<div><span style="color: var(--text-muted)">Expected:</span> <div class="code-diff diff-expected">${escapeHtml(err.expected)}</div></div>` : ''}
                ${err.found ? `<div><span style="color: var(--text-muted)">Found:</span> <div class="code-diff diff-found">${escapeHtml(err.found)}</div></div>` : ''}
              </div>
            `;
          });

          resultsContainer.innerHTML = html;
        }
      } catch (err) {
        resultsContainer.innerHTML = `<p style="color: var(--error-red);">Failed to communicate with Nova Debug backend.</p>`;
      }
    }

    function escapeHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    // Initialize line numbers on page load
    updateLineNumbers();
  </script>
</body>
</html>
